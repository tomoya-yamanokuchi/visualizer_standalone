# Standalone cutting-process visualizer config.
#
# Usage:
#   cd denoising_diffusion_pytorch/visualizer_standalone
#   python3 render_cutting_process.py --config config.yaml --no-ray --no-save-eps
#
# This visualizer does not load diffusion models. It reads saved rollout data:
#   root_folder/tags/model_type/episode_x/rollout_data.pickle
#   root_folder/tags/model_type/episode_x/oracle_obs_cast_z_axis0.png

# Evaluation result root directory.
# If tags is non-empty, the script reads root_folder / tag for each tag.
# --------------------------------

# << --- Object ABC --- >>

# +++ conditional_diffusion +++
