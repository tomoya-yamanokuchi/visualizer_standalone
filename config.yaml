# --------------------------------
tags:
  # - epsilon_greedy_00
  - oracle_obs

# Output naming.
save_prefix: no_axis_w_cutting_plane3
save_subdir: 3d_cutting_process

# Input filenames inside each episode directory.
rollout_filename: rollout_data.pickle
oracle_obs_filename: oracle_obs_cast_z_axis0.png

# The 2D map size and the 3D voxel grid side length.
# For the simple setup, 64 x 64 maps correspond to a 16 x 16 x 16 voxel grid.
dim_2d: 64
dim_3d: 16

# Voxel grid bounds: [xmin, xmax, ymin, ymax, zmin, zmax]
bounds: [-0.05, 0.05, -0.05, 0.05, -0.05, 0.05]

# Target selection.
# null means all model-type folders / first max_episodes episodes.
model_type_indices: null
episode_indices: null
max_episodes: 1

# Match the original paper-style frame duplication:
# - prepend an empty frame
# - duplicate each frame
# - roll action indices by one
# - append the final frame once
paper_frame_interleave: true

renderer:
  # Recommended default for local debugging and stable rendering.
  # PyVista/VTK rendering can be fragile when Ray is used in Docker.
  use_ray: true

  # Used only when use_ray: true.
  max_in_flight: 1

  # EPS export is fragile in PowerPoint and headless Docker environments.
  save_eps: false

  # PNG is recommended for slide editing and debugging individual frames.
  save_png: false

  # PDF export uses PyVista/VTK vector export. It is often easier to handle than EPS,
  # but may still depend on the local VTK/OpenGL environment.
  save_pdf: false

  # Video outputs.
  # GIF is kept for backward compatibility.
  # MP4 is recommended for PowerPoint because playback is smoother and colors are stable.
  save_gif: false
  save_mp4: true

  # Timing and quality.
  # gif_duration_ms is also used as the per-frame semantic duration for MP4.
  gif_duration_ms: 500
  mp4_fps: 30
  mp4_quality: 8

  # Optional speed-up.
  # false keeps the historical behavior: one invisible anchor mesh per voxel.
  # true uses one invisible bounding box instead. Visible voxels are drawn unchanged.
  fast_bounds_anchor: false
